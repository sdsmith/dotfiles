# Set prefix - default C-b interferes with emacs
unbind C-b
set-option -g prefix C--
# If you press `C-- (as in prefix) C--`, sends `C--` to the terminal
bind C-- send-prefix

################################################################################
# Visuals
################################################################################

# Support true color in terminal
set -g default-terminal "tmux-256color"
# TODO: Ensure ghostty's GPU-accelerated colors pass through to tmux. Confim this works/is necessary.
set -ga terminal-overrides ",xterm-256color:Tc"

################################################################################
# Clipboard/copy-paste handling
################################################################################
#
# NOTE: System clipboard intergration depends on a chain of configuration. For remote systems using ghostty -> ssh (ie. et/mosh) -> tmux -> emacs:
# - ghostty must allow OSC 52 handling
# - ssh must allow OSC 52 passthrough (does by default)
# - tmux must allow OSC 52 passthrough
# - emacs must support OSC 52 handling
#
# IMPORTANT: tmux does not support sending the remote clipboard to the
# local terminal. It can't work.
#
# allow-passthrough requires tmux >=3.3
set -g allow-passthrough on
set-option -s set-clipboard on

################################################################################
# Quality of life
################################################################################

# Don't add delay to ESC key
set -sg escape-time 0

# Renumber windows
set -g renumber-windows on

# Easy tmux config reloads
# NOTE: tmux-sensible also binds this to `R`
bind r source-file ~/.tmux.conf \; display "Reloaded"

################################################################################
# Visuals
################################################################################

# modes
setw -g clock-mode-colour colour5
# NOTE: mode-style: includes text highlight and scroll indicator
setw -g mode-style 'fg=colour1 bg=colour240 bold'

# panes
set -g pane-border-style fg=colour67
set -g pane-active-border-style 'fg=colour51 bg=default'

# Status bar
#
# ref: https://tao-of-tmux.readthedocs.io/en/latest/manuscript/09-status-bar.html

set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour237 fg=colour137 dim'
set -g status-left ''
set -g status-right '#{?client_prefix,#[reverse]<Prefix>#[noreverse] ,}#[fg=colour233,bg=colour243] %m/%d #[fg=colour233,bg=colour247] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style 'fg=colour1 bg=colour240 bold'
setw -g window-status-current-format ' #I#[fg=colour249]:#[fg=colour255]#W#[fg=colour249]#F '

setw -g window-status-style 'fg=colour9 bg=colour235'
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

setw -g window-status-bell-style 'fg=colour255 bg=colour1 bold'

set -g message-style 'fg=colour249 bg=colour240 bold'


################################################################################
# Plugins
################################################################################

# TPM: Tmux Plugin Manager
#
# IMPORTANT: requires tpm to be cloned and available in ~/.tmux/plugins/tpm. Some tmux package will do this for you. If not, manually clone.
#     git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# IMPORTANT: need to run `prefix I` to install new plugins
set -g @plugin 'tmux-plugins/tpm'

# Community agreed sensible defaults.
#
# NOTE: Will not override user defined settings
#
# Keep holding C and repeat next key to cycle windows instead of doing prefix every time:
# prefix C-p    previous-window
# prefix C-n    next-window
#
# prefix R      reload tmux config
# prefix -      last-window         NOTE: dependent on prefix key. C-- => -, C-b => b
#
set -g @plugin 'tmux/plugins/tmux-sensible'

# Resurrect: restore tmux env after system restart
set -g @plugin 'tmux/plugins/tmux-resurrect'

# Continuum: tmux session persistence across reboots. Requires Resurrect.
set -g @plugin 'tmux/plugins/tmux-continuum'
# Restore last saved environment when tmux is started
set -g @continuum-boot 'on'
# Save interval, in minutes (default is 15mins)
set -g @continuum-save-interval '15'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
